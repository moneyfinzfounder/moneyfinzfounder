<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moneyfinz – Admin</title>
<meta name="theme-color" content="#1A56DB">
<link rel="manifest" href="manifest-admin.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MZ Admin">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{-webkit-user-select:text;-moz-user-select:text;user-select:text;-webkit-touch-callout:default}

:root{
  --blue:#1A56DB;--blue-dark:#1241B8;--blue-light:#EBF2FF;--blue-mid:#DBEAFE;
  --green:#16A34A;--green-light:#DCFCE7;--red:#DC2626;--red-light:#FEE2E2;
  --orange:#F97316;--orange-light:#FFF7ED;--text:#111827;--text-sub:#374151;--text-muted:#6B7280;
  --border:#E5E7EB;--bg:#F3F4F6;--white:#fff;
}

html,body{height:100%;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;color:var(--text)}

#app{min-height:100vh;display:flex;flex-direction:column}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}

/* ── BOOT ── */
#screen-boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--white);gap:14px;z-index:999}
.spinner{width:34px;height:34px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#screen-boot p{color:var(--text-muted);font-size:13.5px}
#boot-error{display:none;flex-direction:column;align-items:center;gap:10px;padding:24px;text-align:center;max-width:360px}
#boot-error p{color:var(--text-sub);font-size:13.5px;line-height:1.5}

/* ── LOGIN ── */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--white);border-radius:20px;box-shadow:0 4px 24px rgba(17,24,39,.08);padding:32px 26px;width:100%;max-width:380px}
.login-logo{width:52px;height:52px;border-radius:14px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;margin:0 auto 16px}
.login-card h1{font-size:19px;font-weight:800;text-align:center;letter-spacing:-.3px}
.login-card p.sub{font-size:13px;color:var(--text-muted);text-align:center;margin-top:4px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:14.5px;background:var(--bg);color:var(--text)}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);background:var(--white)}
.login-err{background:var(--red-light);color:var(--red);font-size:12.5px;font-weight:600;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none}

/* ── BUTTONS ── */
.btn{padding:12px 18px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;width:100%}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:active{background:var(--blue-dark)}
.btn-secondary{background:var(--bg);color:var(--text)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:var(--white);color:var(--text-sub);border:1.5px solid var(--border)}
.btn-sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
.topbar .who{font-size:11.5px;color:var(--text-muted);margin-top:2px}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--blue-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0}
.icon-btn.logout{background:var(--red-light);color:var(--red)}

/* ── TAB STRIP ── */
.tab-strip{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.tab-strip button{flex:1;padding:13px 0;font-size:13.5px;font-weight:600;color:var(--text-muted);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer}
.tab-strip button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

.scroll{flex:1;overflow-y:auto;max-width:760px;width:100%;margin:0 auto}

/* ── PANELS ── */
.panel{display:none;padding-bottom:40px}
.panel.active{display:block}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px}
.stat-card{background:var(--white);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stat-card .num{font-size:24px;font-weight:800;color:var(--text)}
.stat-card .lbl{font-size:11.5px;color:var(--text-muted);margin-top:3px;font-weight:600}
.stat-card.accent-green .num{color:var(--green)}
.stat-card.accent-orange .num{color:var(--orange)}
.stat-card.accent-blue .num{color:var(--blue)}

.section-title{font-size:12.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin:20px 16px 8px}

/* ── SEARCH ── */
.search-bar{margin:14px 16px 0}
.search-bar input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;background:var(--white)}
.search-bar input:focus{outline:none;border-color:var(--blue)}

/* ── LISTS ── */
.list{margin:12px 16px;display:flex;flex-direction:column;gap:8px}
.card-row{background:var(--white);border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.card-row .info{min-width:0;flex:1}
.card-row .info .t1{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-row .info .t2{font-size:12px;color:var(--text-muted);margin-top:3px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:13.5px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.active{background:var(--green-light);color:var(--green)}
.badge.inactive{background:var(--red-light);color:var(--red)}
.badge.pending{background:var(--orange-light);color:var(--orange)}

/* ── PAYMENT CARD ── */
.pay-card{background:var(--white);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.pay-card .row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pay-card .email{font-weight:700;font-size:14px}
.pay-card .meta{font-size:12px;color:var(--text-muted);margin-top:3px}
.pay-card .trx{background:var(--bg);border-radius:10px;padding:8px 12px;font-size:12.5px;font-family:monospace;margin-bottom:12px;word-break:break-all}
.pay-card .actions{display:flex;gap:8px}
.pay-card .actions .btn{flex:1}
.approve-days{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.approve-days input{width:64px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:13.5px;text-align:center}
.approve-days span{font-size:12.5px;color:var(--text-muted)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.5);display:none;align-items:flex-end;justify-content:center;z-index:500}
.modal-overlay.open{display:flex}
.modal-card{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:22px 20px 28px}
@media(min-width:640px){
  .modal-overlay{align-items:center}
  .modal-card{border-radius:20px;max-height:86vh}
}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h2{font-size:17px;font-weight:800}
.modal-head .close-x{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;font-size:16px;color:var(--text-muted);cursor:pointer}

.info-grid{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:12.5px;color:var(--text-sub)}
.info-grid div{display:flex;justify-content:space-between;padding:4px 0}
.info-grid div span:first-child{color:var(--text-muted)}
.info-grid div span:last-child{font-weight:600;text-align:right;word-break:break-all;margin-left:12px}

.seg{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
.seg button{flex:1;padding:10px 0;border:none;border-radius:9px;background:transparent;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer}
.seg button.active{background:var(--white);box-shadow:0 1px 3px rgba(0,0,0,.1);color:var(--blue)}
.seg button.active.on{color:var(--green)}
.seg button.active.off{color:var(--red)}

.quick-days{display:flex;gap:6px;margin-bottom:10px}
.quick-days button{flex:1;padding:8px 0;border-radius:9px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:700;color:var(--text-sub);cursor:pointer}

details.raw-block{background:var(--bg);border-radius:12px;padding:12px 14px;margin-top:14px}
details.raw-block summary{font-size:13px;font-weight:700;cursor:pointer;color:var(--text-sub)}
details.raw-block textarea{width:100%;min-height:140px;margin-top:10px;font-family:monospace;font-size:11.5px;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--white)}
details.raw-block .btn{margin-top:8px}

.modal-actions{display:flex;gap:10px;margin-top:18px}

/* ── TOAST ── */
#toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:var(--text);color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:999;max-width:88%;text-align:center}
#toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div id="app">

  <div id="screen-boot">
    <div class="spinner" id="boot-spinner"></div>
    <p id="boot-loading">Loading admin panel…</p>
    <div id="boot-error">
      <p id="boot-error-msg"></p>
    </div>
  </div>

  <div class="screen" id="screen-login">

  <div class="screen" id="screen-admin">
    <div class="topbar">
      <div>

      <button class="icon-btn logout" onclick="doLogout()" title="Sign out">⏻</button>

    <div class="tab-strip">

    <div class="scroll">

      <div class="panel active" id="panel-overview">
        <div class="stat-grid">

          <div class="stat-card"><div class="num" id="stat-newmonth">–</div><div class="lbl">New This Month</div></div>
        </div>
        <div class="section-title">Recently Joined</div>
        <div class="list" id="recent-list"></div>
      </div>

      <div class="panel" id="panel-users">
        <div class="search-bar">
          <input type="text" id="user-search" placeholder="Search by email or name…" oninput="renderUsers()">
        </div>
        <div class="list" id="users-list"></div>
      </div>

      <div class="panel" id="panel-payments">
        <div class="list" id="payments-list" style="margin-top:14px"></div>
      </div>

    </div>
  </div>

</div>

<!-- ══════ USER DETAIL / EDIT MODAL ══════ -->
<div class="modal-overlay" id="user-modal" onclick="closeUserModalBg(event)">
  <div class="modal-card">
    <div class="modal-head">

<div id="toast"></div>

<!-- ══════════ FIREBASE ══════════ -->
<script type="module">
(async () => {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const {
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
    } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    const {
      getFirestore, doc, updateDoc, onSnapshot, collection, query, where, serverTimestamp
    } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

    // Same Firebase project as the main Moneyfinz app — this admin panel
    // reads/writes the exact same Firestore data. Access control is NOT
    // enforced here in the client code (that would be trivial to bypass);
    // it's enforced by Firestore Security Rules on the server, which must
    // allow only specific admin UID(s) to read/write every user's
    // document. See the setup notes provided alongside this file.
    const firebaseConfig = {
      apiKey: "AIzaSyC4Z2ZUwdaWYQWxDvrBkYWcjbppRokq4Y0",
      authDomain: "moneyfinz.firebaseapp.com",
      projectId: "moneyfinz",
      storageBucket: "moneyfinz.firebasestorage.app",
      messagingSenderId: "918398350903",
      appId: "1:918398350903:web:2a7a9629ed68994f9271b2",
      measurementId: "G-LDDEQR4PDG"
    };

    // Named app instance (NOT the default app) so this admin panel's login
    // session is stored separately from the main app's session in the same
    // browser. Without this, logging into the admin panel would overwrite
    // the "current user" for any other Moneyfinz tab open on the same device.
    const fbApp = initializeApp(firebaseConfig, "moneyfinzAdmin");
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    window.__fb = { auth, db, doc, updateDoc, onSnapshot, collection, query, where, serverTimestamp, signInWithEmailAndPassword, signOut };

    let unsubUsers = null, unsubPayments = null;

    onAuthStateChanged(auth, (user) => {
      if (unsubUsers) { unsubUsers(); unsubUsers = null; }
      if (unsubPayments) { unsubPayments(); unsubPayments = null; }

      if (!user) {
        window.onAdminLoggedOut && window.onAdminLoggedOut();
        return;
      }

      window.__fb.currentAdmin = user;

      // Try to attach a live listener across ALL users. If this admin
      // account isn't allow-listed in Firestore Security Rules, this will
      // fail with a permission-denied error — that's how we detect "not an
      // admin" instead of trying to guess it client-side.
      unsubUsers = onSnapshot(collection(db, 'users'), (snap) => {
        const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        window.onUsersUpdate && window.onUsersUpdate(users);
      }, (err) => {
        console.error('Users listener error:', err);
        window.onAdminAccessDenied && window.onAdminAccessDenied(err);
      });

      unsubPayments = onSnapshot(
        query(collection(db, 'paymentRequests'), where('status', '==', 'pending')),
        (snap) => {
          const reqs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          window.onPaymentsUpdate && window.onPaymentsUpdate(reqs);
        },
        (err) => { console.error('Payments listener error:', err); }
      );
    }, (err) => {
      console.error('Auth state error:', err);
      window.onAdminBootError && window.onAdminBootError('Authentication error: ' + err.message);
    });

    window.adminSignIn = (email, password) => signInWithEmailAndPassword(auth, email, password);
    window.adminSignOut = () => signOut(auth);

    window.adminUpdateUser = (uid, payload) => updateDoc(doc(db, 'users', uid), payload);
    window.adminUpdatePayment = (id, payload) => updateDoc(doc(db, 'paymentRequests', id), payload);
    window.adminServerTimestamp = () => serverTimestamp();

    window.onAdminBootResolved && window.onAdminBootResolved();

  } catch (err) {
    console.error('Firebase init failed:', err);
    window.onAdminBootError ? window.onAdminBootError('Could not connect to Firebase: ' + err.message)
      : alert('Could not connect to Firebase: ' + err.message);
  }
})();
</script>

<!-- ══════════ APP LOGIC ══════════ -->
<script>
let allUsers = [];
let allPayments = [];
let bootDone = false;
let currentEditUid = null;
let editState = { subscribed: false, pendingRequest: false };

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>el.classList.remove('show'), 2600);
}

function showScreen(id){
  ['screen-login','screen-admin'].forEach(s=>document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('screen-boot').style.display = 'none';
}

function showBootError(msg){
  document.getElementById('boot-spinner').style.display='none';
  document.getElementById('boot-loading').style.display='none';
  const b = document.getElementById('boot-error');
  b.style.display = 'flex';
  document.getElementById('boot-error-msg').textContent = msg;
}
window.onAdminBootError = showBootError;

window.onAdminBootResolved = function(){ bootDone = true; };

window.onAdminLoggedOut = function(){
  showScreen('screen-login');
  document.getElementById('login-err').style.display='none';
};

window.onAdminAccessDenied = function(err){
  showBootError('');
  document.getElementById('boot-error').style.display='none';
  document.getElementById('login-err').textContent =
    "This account doesn't have admin access. Ask the project owner to add your account's UID to the Firestore Security Rules admin list.";
  document.getElementById('login-err').style.display='block';
  showScreen('screen-login');
  window.adminSignOut && window.adminSignOut();
};

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  errEl.style.display='none';
  if(!email || !password) return;
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try{
    await window.adminSignIn(email, password);
    // onAuthStateChanged + the users listener above will decide whether
    // this account actually has admin access.
  }catch(e){
    let msg = 'Could not sign in. Please check your email and password.';
    if(e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'){
      msg = 'Incorrect email or password.';
    }
    errEl.textContent = msg;
    errEl.style.display='block';
  }
  btn.textContent = 'Sign In'; btn.disabled = false;
}

function doLogout(){
  window.adminSignOut && window.adminSignOut();
}

// ── Once the users listener fires successfully, we know this account
// really does have admin access — show the dashboard.
window.onUsersUpdate = function(users){
  allUsers = users;
  document.getElementById('admin-who').textContent =
    (window.__fb.currentAdmin && window.__fb.currentAdmin.email) || '';
  showScreen('screen-admin');
  renderOverview();
  renderUsers();
  // Keep an open edit modal in sync if the admin (or the user themselves)
  // changes data elsewhere while the modal is open.
  if(currentEditUid){
    const u = allUsers.find(x=>x.id===currentEditUid);
    if(u) fillUserModal(u, false);
  }
};

window.onPaymentsUpdate = function(payments){
  allPayments = payments.sort((a,b)=>tsToDate(b.createdAt)-tsToDate(a.createdAt));
  renderOverview();
  renderPayments();
};

function tsToDate(v){
  if(!v) return new Date(0);
  if(v.toDate) return v.toDate();
  return new Date(v);
}

// ── NAVIGATION ──
function switchPanel(name){
  ['overview','users','payments'].forEach(p=>{
    document.getElementById('panel-'+p).classList.remove('active');
    document.getElementById('tab-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── OVERVIEW ──
function renderOverview(){
  const now = new Date();
  const active = allUsers.filter(u => u.subscribed && u.expiryDate && tsToDate(u.expiryDate) > now).length;
  const newMonth = allUsers.filter(u => {
    const d = tsToDate(u.createdAt);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).length;

  document.getElementById('stat-total').textContent = allUsers.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-pending').textContent = allPayments.length;
  document.getElementById('stat-newmonth').textContent = newMonth;

  const recent = [...allUsers].sort((a,b)=>tsToDate(b.createdAt)-tsToDate(a.createdAt)).slice(0,6);
  const list = document.getElementById('recent-list');
  if(!recent.length){
    list.innerHTML = '<div class="empty-state">No users yet.</div>';
    return;
  }
  list.innerHTML = recent.map(u => userRowHtml(u)).join('');
}

// ── USERS ──
function userIsActive(u){
  return !!(u.subscribed && u.expiryDate && tsToDate(u.expiryDate) > new Date());
}

function userRowHtml(u){
  const active = userIsActive(u);
  const badge = u.pendingRequest
    ? '<span class="badge pending">Pending</span>'
    : (active ? '<span class="badge active">Active</span>' : '<span class="badge inactive">Inactive</span>');
  const name = u.name ? u.name : u.email || '(no email)';
  return `<div class="card-row" onclick="openUserModal('${u.id}')">
    <div class="info">
      <div class="t1">${escapeHtml(name)}</div>
      <div class="t2">${escapeHtml(u.email||'-')}</div>
    </div>
    ${badge}
  </div>`;
}

function renderUsers(){
  const q = (document.getElementById('user-search').value||'').toLowerCase().trim();
  let list = allUsers;
  if(q){
    list = list.filter(u =>
      (u.email||'').toLowerCase().includes(q) || (u.name||'').toLowerCase().includes(q)
    );
  }
  list = [...list].sort((a,b)=>tsToDate(b.createdAt)-tsToDate(a.createdAt));
  const el = document.getElementById('users-list');
  if(!list.length){
    el.innerHTML = '<div class="empty-state">No users found.</div>';
    return;
  }
  el.innerHTML = list.map(u => userRowHtml(u)).join('');
}

// ── PAYMENTS ──
function renderPayments(){
  const el = document.getElementById('payments-list');
  if(!allPayments.length){
    el.innerHTML = '<div class="empty-state">No pending payment requests.</div>';
    return;
  }
  el.innerHTML = allPayments.map(p => `
    <div class="pay-card">
      <div class="row1">
        <div>
          <div class="email">${escapeHtml(p.email||'-')}</div>
          <div class="meta">Amount: ${p.amount!=null?p.amount:'-'} · ${fmtDate(tsToDate(p.createdAt))}</div>
        </div>
      </div>
      <div class="trx">TrxID: ${escapeHtml(p.trxId||'-')}</div>
      <div class="approve-days">
        <span>Grant</span>
        <input type="number" min="1" value="30" id="days-${p.id}">
        <span>days</span>
      </div>
      <div class="actions">
        <button class="btn btn-success btn-sm" style="flex:1" onclick="approvePayment('${p.id}','${p.uid}')">Approve</button>
        <button class="btn btn-danger btn-sm" style="flex:1" onclick="rejectPayment('${p.id}','${p.uid}')">Reject</button>
      </div>
    </div>
  `).join('');
}

async function approvePayment(reqId, uid){
  const daysInput = document.getElementById('days-'+reqId);
  const days = Math.max(1, parseInt(daysInput.value,10) || 30);
  const u = allUsers.find(x=>x.id===uid);
  const now = new Date();
  const currentExpiry = (u && u.subscribed && u.expiryDate && tsToDate(u.expiryDate) > now) ? tsToDate(u.expiryDate) : now;
  const newExpiry = new Date(currentExpiry.getTime() + days*24*60*60*1000);
  try{
    await window.adminUpdateUser(uid, { subscribed:true, expiryDate:newExpiry, pendingRequest:false });
    await window.adminUpdatePayment(reqId, { status:'approved', approvedAt: window.adminServerTimestamp() });
    showToast('✅ Subscription approved for '+days+' days');
  }catch(e){
    showToast('⚠️ Could not approve: '+e.message);
  }
}

async function rejectPayment(reqId, uid){
  try{
    await window.adminUpdatePayment(reqId, { status:'rejected', rejectedAt: window.adminServerTimestamp() });
    await window.adminUpdateUser(uid, { pendingRequest:false });
    showToast('Request rejected');
  }catch(e){
    showToast('⚠️ Could not reject: '+e.message);
  }
}

// ── USER EDIT MODAL ──
function openUserModal(uid){
  const u = allUsers.find(x=>x.id===uid);
  if(!u) return;
  currentEditUid = uid;
  fillUserModal(u, true);
  document.getElementById('user-modal').classList.add('open');
}
function closeUserModal(){
  document.getElementById('user-modal').classList.remove('open');
  currentEditUid = null;
}
function closeUserModalBg(e){ if(e.target===document.getElementById('user-modal')) closeUserModal(); }

function fillUserModal(u, resetFields){
  const joined = u.createdAt ? fmtDate(tsToDate(u.createdAt)) : '-';
  document.getElementById('user-info-grid').innerHTML = `
    <div><span>UID</span><span>${escapeHtml(u.id)}</span></div>
    <div><span>Email</span><span>${escapeHtml(u.email||'-')}</span></div>
    <div><span>Joined</span><span>${joined}</span></div>
    <div><span>Transactions</span><span>${Array.isArray(u.txns)?u.txns.length:0}</span></div>
    <div><span>Budgets</span><span>${Array.isArray(u.budgets)?u.budgets.length:0}</span></div>
    <div><span>Last TrxID</span><span>${escapeHtml(u.lastTrxId||'-')}</span></div>
  `;

  if(resetFields){
    document.getElementById('edit-name').value = u.name || '';
    document.getElementById('edit-currency').value = u.currency || 'USD';
    editState.subscribed = !!u.subscribed;
    editState.pendingRequest = !!u.pendingRequest;
    updateSegButtons();
    const exp = u.expiryDate ? tsToDate(u.expiryDate) : null;
    document.getElementById('edit-expiry').value = exp ? isoDateStr(exp) : '';
    document.getElementById('edit-txns-json').value = JSON.stringify(u.txns||[], null, 2);
    document.getElementById('edit-budgets-json').value = JSON.stringify(u.budgets||[], null, 2);
  }
}

function setEditSubscribed(val){ editState.subscribed = val; updateSegButtons(); }
function setEditPending(val){ editState.pendingRequest = val; updateSegButtons(); }
function updateSegButtons(){
  document.getElementById('seg-sub-on').className = editState.subscribed ? 'active on' : '';
  document.getElementById('seg-sub-off').className = !editState.subscribed ? 'active off' : '';
  document.getElementById('seg-pend-on').className = editState.pendingRequest ? 'active on' : '';
  document.getElementById('seg-pend-off').className = !editState.pendingRequest ? 'active off' : '';
}

function bumpExpiry(days){
  const input = document.getElementById('edit-expiry');
  const base = input.value ? new Date(input.value+'T00:00:00') : new Date();
  const next = new Date(Math.max(base.getTime(), Date.now()) + days*24*60*60*1000);
  input.value = isoDateStr(next);
}

async function saveUserEdits(){
  if(!currentEditUid) return;
  const name = document.getElementById('edit-name').value.trim();
  const currency = document.getElementById('edit-currency').value.trim().toUpperCase() || 'USD';
  const expiryStr = document.getElementById('edit-expiry').value;
  const payload = {
    name, currency,
    subscribed: editState.subscribed,
    pendingRequest: editState.pendingRequest,
    expiryDate: expiryStr ? new Date(expiryStr+'T23:59:59') : null
  };
  try{
    await window.adminUpdateUser(currentEditUid, payload);
    showToast('✅ User updated');
    closeUserModal();
  }catch(e){
    showToast('⚠️ Could not save: '+e.message);
  }
}

async function saveRawField(field){
  if(!currentEditUid) return;
  const ta = document.getElementById(field==='txns' ? 'edit-txns-json' : 'edit-budgets-json');
  let parsed;
  try{
    parsed = JSON.parse(ta.value);
    if(!Array.isArray(parsed)) throw new Error('Must be a JSON array');
  }catch(e){
    showToast('⚠️ Invalid JSON: '+e.message);
    return;
  }
  try{
    await window.adminUpdateUser(currentEditUid, { [field]: parsed });
    showToast('✅ '+(field==='txns'?'Transactions':'Budgets')+' saved');
  }catch(e){
    showToast('⚠️ Could not save: '+e.message);
  }
}

// ── HELPERS ──
function isoDateStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDate(d){
  if(!d || isNaN(d.getTime())) return '-';
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Watchdog: if Firebase never resolves, stop spinning forever.
setTimeout(function(){
  if(!bootDone){
    showBootError('This is taking too long to load. Make sure this file is served over http/https (not opened directly), and that you have an internet connection.');
  }
}, 10000);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw-admin.js').catch(err => console.log('SW registration failed:', err));
  });
}
</script>
